schema_version: 1

context:
  version: "0.10.1"

package:
  name: fps-noauth
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-noauth/fps_noauth-${{ version }}.tar.gz
    sha256: 0576d3fe0ac320b42dbee49c515103f0e20622ce8e5e14427670c52783d08474

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - fastapi-core
    - fps
    - jupyverse-auth >=0.2.0,<0.3.0

tests:
  - python:
      imports: fps_noauth
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/noauth
  summary: An FPS plugin for an unprotected API

extra:
  recipe-maintainers:
    - davidbrochart
